<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitMatch Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#238636",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Onboarding Container -->
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-primary flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-3xl">terminal</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">GitMatch</h2>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-8 rounded-full bg-slate-200 dark:bg-primary/20"></div>
<div class="h-1.5 w-8 rounded-full bg-slate-200 dark:bg-primary/20"></div>
</div>
<!-- Main Content (Step 1 Focus) -->
<main class="flex-1 flex flex-col items-center px-6 max-w-md mx-auto w-full">
<!-- Illustration Area -->
<div class="w-full mt-4 mb-8">
<div class="aspect-square w-full rounded-xl bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center border border-primary/20 relative overflow-hidden">
<!-- Abstract Code Branches Pattern -->
<div class="absolute inset-0 opacity-20" data-alt="Abstract grid pattern representing code structure" style="background-image: radial-gradient(circle at 2px 2px, #238636 1px, transparent 0); background-size: 24px 24px;">
</div>
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-8xl text-primary animate-pulse">account_tree</span>
<div class="mt-4 flex gap-4">
<span class="material-symbols-outlined text-4xl text-primary/60">commit</span>
<span class="material-symbols-outlined text-4xl text-primary/40">merge</span>
<span class="material-symbols-outlined text-4xl text-primary/60">fork_right</span>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Find your next project</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg leading-relaxed">
                    Discover open-source repositories tailored to your tech stack, skill level, and interests.
                </p>
</div>
<!-- Features Quick Look -->
<div class="w-full mt-10 grid grid-cols-1 gap-4">
<div class="flex items-start gap-4 p-4 rounded-xl bg-slate-100 dark:bg-primary/5 border border-transparent dark:border-primary/10">
<div class="bg-primary/20 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">filter_list</span>
</div>
<div>
<h3 class="font-semibold text-slate-900 dark:text-slate-100">Smart Filters</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Filter by language, stars, or activity.</p>
</div>
</div>
</div>
</main>
<!-- Footer Actions -->
<footer class="p-6 sticky bottom-0 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark pt-12">
<div class="max-w-md mx-auto w-full flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 group">
                    Next Step
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="w-full bg-transparent hover:bg-slate-100 dark:hover:bg-primary/10 text-slate-500 dark:text-slate-400 font-medium py-3 rounded-xl transition-colors">
                    Skip Intro
                </button>
</div>
</footer>
<!-- Step 2 & 3 Preview (Hidden for structure, but demonstrating the components) -->
<div class="hidden opacity-0 pointer-events-none">
<!-- Step 2: Swipe to Match -->
<div class="aspect-square w-full rounded-xl bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center overflow-hidden" data-alt="Tinder-style swipe interface for repo cards">
<div class="relative w-64 h-80 bg-slate-800 rounded-xl border border-primary/30 flex flex-col p-4 shadow-2xl rotate-3 translate-x-10">
<div class="h-4 w-20 bg-primary/20 rounded mb-2"></div>
<div class="h-6 w-40 bg-slate-600 rounded mb-4"></div>
<div class="flex-1 bg-slate-700 rounded-lg"></div>
</div>
<div class="absolute w-64 h-80 bg-slate-900 rounded-xl border border-primary/50 flex flex-col p-4 shadow-2xl z-10 -rotate-3">
<div class="h-4 w-24 bg-primary/40 rounded mb-2"></div>
<div class="h-6 w-32 bg-slate-500 rounded mb-4"></div>
<div class="flex-1 bg-slate-800 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl">swipe</span>
</div>
</div>
</div>
<!-- Step 3: Build Together -->
<div class="aspect-square w-full rounded-xl bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center" data-alt="Collaboration icon with two people working on code">
<div class="relative">
<span class="material-symbols-outlined text-9xl text-primary">groups</span>
<div class="absolute -top-2 -right-2 flex space-x-[-12px]">
<div class="h-8 w-8 rounded-full border-2 border-background-dark bg-slate-500" data-alt="User avatar 1"></div>
<div class="h-8 w-8 rounded-full border-2 border-background-dark bg-primary" data-alt="User avatar 2"></div>
</div>
</div>
</div>
</div>
</div>
</body></html>
